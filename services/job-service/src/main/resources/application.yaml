server:
  port: 5002

spring:
  application:
    name: job-service

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  datasource:
    url: jdbc:postgresql://localhost:5433/yt_job_portal_job
    username: postgres
    password: 123
    driver-class-name: org.postgresql.Driver

